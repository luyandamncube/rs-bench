services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: bm-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: benchmark
      CLICKHOUSE_USER: benchmark
      CLICKHOUSE_PASSWORD: benchmark
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    cpus: 6.0
    mem_limit: 8g
    memswap_limit: 8g
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  bench-datafusion:
    build:
      context: .
      dockerfile: docker/bench.Dockerfile
    container_name: bm-bench-datafusion
    working_dir: /workspace
    command: >
      /workspace/target/debug/bmrun run --config configs/runs/datafusion_${BENCH_FORMAT}_smoke.toml
    volumes:
      - ./:/workspace
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - rustup_home:/root/.rustup
      - target_cache:/workspace/target
    cpus: 6.0
    mem_limit: 8g
    memswap_limit: 8g
    depends_on:
      clickhouse:
        condition: service_healthy

  bench-duckdb:
    build:
      context: .
      dockerfile: docker/bench.Dockerfile
    container_name: bm-bench-duckdb
    working_dir: /workspace
    command: >
      /workspace/target/debug/bmrun run --config configs/runs/duckdb_${BENCH_FORMAT}_smoke.toml
    volumes:
      - ./:/workspace
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - rustup_home:/root/.rustup
      - target_cache:/workspace/target
    cpus: 6.0
    mem_limit: 8g
    memswap_limit: 8g
    depends_on:
      clickhouse:
        condition: service_healthy

  bench-clickhouse:
    build:
      context: .
      dockerfile: docker/bench.Dockerfile
    container_name: bm-bench-clickhouse
    working_dir: /workspace
    command: >
      /workspace/target/debug/bmrun run --config configs/runs/clickhouse_${BENCH_FORMAT}_smoke.toml
    environment:
      CLICKHOUSE_URL: "http://clickhouse:8123"
      CLICKHOUSE_DATABASE: "benchmark"
      CLICKHOUSE_USER: "benchmark"
      CLICKHOUSE_PASSWORD: "benchmark"
      CLICKHOUSE_TABLE_NAME: "benchmark_table"
    volumes:
      - ./:/workspace
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - rustup_home:/root/.rustup
      - target_cache:/workspace/target
    cpus: 6.0
    mem_limit: 8g
    memswap_limit: 8g
    depends_on:
      clickhouse:
        condition: service_healthy

  bench-polars:
    build:
      context: .
      dockerfile: docker/bench.Dockerfile
    container_name: bm-bench-polars
    working_dir: /workspace
    command: >
      /workspace/target/debug/bmrun run --config configs/runs/polars_${BENCH_FORMAT}_smoke.toml
    volumes:
      - ./:/workspace
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - rustup_home:/root/.rustup
      - target_cache:/workspace/target
    cpus: 6.0
    mem_limit: 8g
    memswap_limit: 8g
    depends_on:
      clickhouse:
        condition: service_healthy

  spark-master:
    image: spark:python3-java17
    container_name: bm-spark-master
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./:/workspace
    cpus: 2.0
    mem_limit: 2g
    memswap_limit: 2g
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  spark-worker:
    image: spark:python3-java17
    container_name: bm-spark-worker
    hostname: spark-worker
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --cores 2
      --memory 1536m
      --webui-port 8081
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./:/workspace
    cpus: 2.0
    mem_limit: 2g
    memswap_limit: 2g

  bench-spark:
    build:
      context: .
      dockerfile: docker/bench.Dockerfile
    container_name: bm-bench-spark
    working_dir: /workspace
    command: >
      /workspace/target/debug/bmrun run --config configs/runs/spark_${BENCH_FORMAT}_smoke.toml
    environment:
      SPARK_MASTER_URL: "spark://spark-master:7077"
    volumes:
      - ./:/workspace
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - rustup_home:/root/.rustup
      - target_cache:/workspace/target
    cpus: 2.0
    mem_limit: 2g
    memswap_limit: 2g
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started

volumes:
  clickhouse_data:
  cargo_registry:
  cargo_git:
  rustup_home:
  target_cache: